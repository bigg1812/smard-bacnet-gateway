# ══════════════════════════════════════════════════════════════
#  SMARD-BACnet Gateway – Methode A: BACnet/IP (direkt, UDP)
# ══════════════════════════════════════════════════════════════
#
#  Diese Config gilt NUR fuer den direkten BACnet/IP-Weg
#  (src/strompreis_bacnet.py + src/verbindungstest.py).
#
#  WICHTIG: Alle Platzhalter durch deine echten Werte ersetzen.
#  Diese Datei NICHT mit echten Daten committen.
# ══════════════════════════════════════════════════════════════


[netzwerk]
# --------------------------------------------------------------
#  IP-Adressen und Ports
# --------------------------------------------------------------
#  controller_ip   = IP-Adresse des BACnet Controllers
#  controller_port = BACnet-Port des Controllers (Standard: 47808)
#  local_ip        = IP-Adresse dieses PCs (auf dem das Skript laeuft)
#  local_port      = Lokaler Port fuer BACnet (NICHT 47808 wenn enteliWEB laeuft!)
# --------------------------------------------------------------

controller_ip   = 192.168.1.100
controller_port = 47808
local_ip        = 192.168.1.50
local_port      = 47809


[bacnet_objekte]
# --------------------------------------------------------------
#  BACnet-Objekt Zuordnung im Controller
# --------------------------------------------------------------
#  av_aktuell = AV-Instanz (Analog Value) fuer den aktuellen Strompreis
#  bv_status  = BV-Instanz (Binary Value) fuer Watchdog/Status (1=Ok, 0=Fehler)
#  priority   = BACnet Priority (1-16, Standard: 14)
#  fehlwert   = Wert der geschrieben wird, wenn kein Preis vorliegt
# --------------------------------------------------------------

av_aktuell = 1000
bv_status  = 1025
priority   = 14
fehlwert   = -1.0


[smard_api]
# --------------------------------------------------------------
#  SMARD API (Bundesnetzagentur)
# --------------------------------------------------------------
#  filter_id = 4169 = Day-Ahead Grosshandelspreis (Standard)
#  region    = DE-LU = Marktgebiet DE/LU
#  timeout   = Sekunden warten auf Antwort
#  (Hinweis: Diese Methode arbeitet stundenbasiert.)
# --------------------------------------------------------------

filter_id = 4169
region    = DE-LU
timeout   = 30


[einheiten]
# --------------------------------------------------------------
#  Umrechnung der Preise (SMARD liefert EUR/MWh)
#    faktor = 1.0   -> EUR/MWh    | 0.1 -> ct/kWh | 0.001 -> EUR/kWh
# --------------------------------------------------------------

faktor  = 0.1
einheit = ct/kWh


[robustheit]
# --------------------------------------------------------------
#  bacnet_timeout = Sekunden warten auf Controller-Antwort
#  bacnet_retries = Anzahl Schreibversuche bei Timeout
#  write_delay    = Pause zwischen Schreibbefehlen (Sekunden)
# --------------------------------------------------------------

bacnet_timeout = 5
bacnet_retries = 3
write_delay    = 0.15
