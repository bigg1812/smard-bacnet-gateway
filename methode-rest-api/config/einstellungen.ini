# ══════════════════════════════════════════════════════════════
#  SMARD-BACnet Gateway – Methode B: enteliWEB REST-API
# ══════════════════════════════════════════════════════════════
#
#  Diese Config gilt NUR fuer den REST-API-Weg (src/gateway_rest.py).
#  Geschrieben wird ueber die enteliWEB Web-API (kein direktes BACnet).
#
#  WICHTIG: Alle Platzhalter durch deine echten Werte ersetzen.
#  Diese Datei NICHT mit echten Zugangsdaten committen.
# ══════════════════════════════════════════════════════════════


[enteliweb]
# --------------------------------------------------------------
#  Zugang zum enteliWEB-Server (REST-API)
#  VORAUSSETZUNG: enteliWEB mit lizenzierter Web-API.
# --------------------------------------------------------------
#  protokoll  = http oder https (https empfohlen)
#  host       = Servername oder IP des enteliWEB-Servers
#  port       = 80 (http) / 443 (https) - oder abweichender Port
#  benutzer   = enteliWEB-Benutzername
#  passwort   = enteliWEB-Passwort
#  site       = BACnet Site-Name (z.B. MeinStandort)
#  device     = Device-ID (z.B. 1234)
#  priority   = BACnet Priority 1-16 (14 laesst manuelle Uebersteuerung zu)
#  dry_run    = ja  -> sendet NICHTS, loggt nur (sicher zum Testen)
#               nein -> schreibt wirklich (oder Flag --live nutzen)
#  verify_tls = ja/nein - TLS-Zertifikat pruefen (selbstsigniert: nein)
# --------------------------------------------------------------

protokoll  = http
host       = DEIN_ENTELIWEB_SERVER
port       = 80
benutzer   = DEIN_BENUTZER
passwort   = DEIN_PASSWORT
site       = DEINE_SITE
device     = 1234
priority   = 14
dry_run    = ja
verify_tls = ja


[smard_api]
# --------------------------------------------------------------
#  SMARD API (Bundesnetzagentur)
# --------------------------------------------------------------
#  filter_id  = 4169 = Day-Ahead Grosshandelspreis (Standard)
#  region     = DE-LU = Marktgebiet DE/LU
#  timeout    = Sekunden warten auf Antwort
#  aufloesung = hour        = Stundenpreis (klassisch)
#               quarterhour = Viertelstundenpreis (Day-Ahead seit Juni 2025)
#                             -> Task dann alle 15 Minuten laufen lassen.
# --------------------------------------------------------------

filter_id  = 4169
region     = DE-LU
timeout    = 30
aufloesung = quarterhour


[einheiten]
# --------------------------------------------------------------
#  Umrechnung der Preise (SMARD liefert EUR/MWh)
#    faktor = 1.0   -> EUR/MWh    | 0.1 -> ct/kWh | 0.001 -> EUR/kWh
# --------------------------------------------------------------

faktor  = 0.1
einheit = ct/kWh


[quellen]
# --------------------------------------------------------------
#  Welche Datenquellen sind aktiv? (an / aus)
# --------------------------------------------------------------
strompreis = an
wetter     = an


[strompreis_objekte]
# --------------------------------------------------------------
#  Ziel-BACnet-Objekte fuer Strompreise (REST-Weg)
# --------------------------------------------------------------
#  av_aktuell      = Objekt fuer den aktuellen Preis, Format "typ,instanz"
#  av_in_24h       = (optional) Objekt fuer den Preis in genau 24 Stunden.
#                    Auskommentiert lassen, wenn nicht gewuenscht. Objekt muss
#                    auf dem Controller existieren. Vormittags ggf. Fehlwert,
#                    bis die Day-Ahead-Auktion fuer morgen (~13:00) da ist.
#  av_morgen_basis = (optional) Start-Instanz fuer die 24 Stundenpreise morgen.
#                    Es werden analog-value,<basis> .. <basis+23> beschrieben.
#  fehlwert        = Wert fuer Stunden/Intervalle ohne Preis
# --------------------------------------------------------------

av_aktuell      = analog-value,1000
# av_in_24h     = analog-value,1001   # deaktiviert: erstmal nur aktueller Preis (AV1000)
# av_morgen_basis = 1100              # deaktiviert: nur aktueller Preis
fehlwert        = -1.0


[wetter_api]
# --------------------------------------------------------------
#  Open-Meteo Wetterprognose (kostenlos, kein API-Key)
# --------------------------------------------------------------
#  latitude/longitude = Standort deiner Anlage (Beispiel: Berlin)
#  werte = Komma-Liste der Open-Meteo-Variablen:
#          temperature_2m       Lufttemperatur (Grad C)
#          shortwave_radiation  Globalstrahlung (W/m2)
#          cloud_cover          Bewoelkung (%)
#          wind_speed_10m       Windgeschwindigkeit (km/h)
#  forecast_days = Anzahl Prognosetage (1-7)
#  timeout = Sekunden
# --------------------------------------------------------------

latitude      = 52.52
longitude     = 13.40
werte         = temperature_2m, shortwave_radiation
forecast_days = 2
timeout       = 30


[wetter_objekte]
# --------------------------------------------------------------
#  Ziel-BACnet-Objekte fuer Wetter (REST-Weg)
#  Schluessel = Open-Meteo-Variable, Wert = "typ,instanz"
# --------------------------------------------------------------

temperature_2m      = analog-value,1010
shortwave_radiation = analog-value,1011
