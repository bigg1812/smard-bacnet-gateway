# ══════════════════════════════════════════════════════════════
#  SMARD-BACnet Gateway – Konfigurationsdatei
# ══════════════════════════════════════════════════════════════
#
#  WICHTIG: Diese Datei MUSS an deine Anlage angepasst werden!
#  Ersetze alle Platzhalter-Werte mit deinen echten Daten.
#
#  Zeilen mit # am Anfang sind Kommentare und werden ignoriert.
#  Leerzeichen um das = sind erlaubt.
#
# ══════════════════════════════════════════════════════════════


[netzwerk]
# --------------------------------------------------------------
#  IP-Adressen und Ports
# --------------------------------------------------------------
#  controller_ip   = IP-Adresse des BACnet Controllers
#  controller_port = BACnet-Port des Controllers (Standard: 47808)
#  local_ip        = IP-Adresse dieses PCs (auf dem das Skript laeuft)
#  local_port      = Lokaler Port fuer BACnet (NICHT 47808 wenn enteliWEB laeuft!)
#
#  ANPASSEN: Trage hier deine IP-Adressen ein!
# --------------------------------------------------------------

controller_ip   = 192.168.1.100
controller_port = 47808
local_ip        = 192.168.1.50
local_port      = 47809


[bacnet_objekte]
# --------------------------------------------------------------
#  BACnet-Objekt Zuordnung im Controller
# --------------------------------------------------------------
#  av_aktuell      = AV-Instanz (Analog Value) fuer den aktuellen Strompreis
#  bv_status       = BV-Instanz (Binary Value) fuer den Watchdog/Status (1=Ok, 0=Fehler/Fehlend)
#  priority        = BACnet Priority (1-16, Standard: 14)
#  fehlwert        = Wert der geschrieben wird wenn kein Preis vorliegt
#
#  ANPASSEN: Trage hier deine Instanznummern ein!
#  Die Werte unten sind nur Beispiele.
# --------------------------------------------------------------

av_aktuell      = 1000
bv_status       = 1025
priority        = 14
fehlwert        = -1.0


[smard_api]
# --------------------------------------------------------------
#  SMARD API Einstellungen (Bundesnetzagentur)
# --------------------------------------------------------------
#  filter_id = Welche Daten abgerufen werden:
#
#    STROMPREISE:
#      4169  = Day-Ahead Grosshandelspreis  ← Standard
#      5078  = Intraday Continuous Durchschnitt
#
#    STROMERZEUGUNG:
#      1223  = Braunkohle
#      1224  = Kernenergie
#      1225  = Wind Offshore
#      1226  = Wasserkraft
#      1227  = Sonstige Konventionelle
#      1228  = Sonstige Erneuerbare
#      4066  = Biomasse
#      4067  = Wind Onshore
#      4068  = Photovoltaik
#      4069  = Steinkohle
#      4070  = Pumpspeicher
#      4071  = Erdgas
#
#    STROMVERBRAUCH:
#      410   = Gesamt (Netzlast)
#      4359  = Residuallast
#      4387  = Pumpspeicher
#
#  region = Welches Marktgebiet:
#      DE       = Deutschland
#      AT       = Oesterreich
#      LU       = Luxemburg
#      DE-LU    = Marktgebiet DE/LU (ab 01.10.2018)
#      DE-AT-LU = Marktgebiet DE/AT/LU (bis 30.09.2018)
#      50Hertz  = Regelzone 50Hertz
#      Amprion  = Regelzone Amprion
#      TenneT   = Regelzone TenneT
#      TransnetBW = Regelzone TransnetBW
#
#  timeout = Wie lange auf Antwort warten (Sekunden)
#
#  aufloesung = Zeitraster fuer den AKTUELLEN Preis:
#      hour        = Stundenpreis (klassisch)
#      quarterhour = Viertelstundenpreis (Day-Ahead seit Juni 2025)
#                    Gateway dann alle 15 Minuten laufen lassen.
# --------------------------------------------------------------

filter_id  = 4169
region     = DE-LU
timeout    = 30
aufloesung = quarterhour


[einheiten]
# --------------------------------------------------------------
#  Umrechnung der Preise
# --------------------------------------------------------------
#  SMARD liefert immer EUR/MWh. Mit dem Faktor wird umgerechnet:
#
#    faktor = 1.0    →  EUR/MWh   (Rohwert von der Boerse)
#    faktor = 0.1    →  ct/kWh    (gaengig in Deutschland)
#    faktor = 0.001  →  EUR/kWh
#
#  Beispiel: 116.70 EUR/MWh × 0.1 = 11.67 ct/kWh
# --------------------------------------------------------------

faktor = 0.1
einheit = ct/kWh


[robustheit]
# --------------------------------------------------------------
#  Timeouts und Wiederholungen
# --------------------------------------------------------------
#  bacnet_timeout  = Sekunden warten auf Controller-Antwort
#  bacnet_retries  = Anzahl Schreibversuche bei Timeout
#  write_delay     = Pause zwischen Schreibbefehlen (Sekunden)
#                    (verhindert Ueberlastung des Controllers)
# --------------------------------------------------------------

bacnet_timeout  = 5
bacnet_retries  = 3
write_delay     = 0.15


# ══════════════════════════════════════════════════════════════
#  REST-API WEG (gateway_rest.py)
# ══════════════════════════════════════════════════════════════
#  Diese Abschnitte gelten NUR fuer den REST-API-Weg ueber enteliWEB
#  (gateway_rest.py). Das klassische BACnet-Skript (strompreis_bacnet.py)
#  ignoriert sie. Beide Wege koennen dieselbe Datei nutzen.
# ══════════════════════════════════════════════════════════════


[enteliweb]
# --------------------------------------------------------------
#  Zugang zum enteliWEB-Server (REST-API)
# --------------------------------------------------------------
#  VORAUSSETZUNG: enteliWEB mit lizenzierter Web-API.
#
#  protokoll  = http oder https (https empfohlen)
#  host       = Servername oder IP des enteliWEB-Servers
#  port       = 80 (http) / 443 (https) - oder abweichender Port
#  benutzer   = enteliWEB-Benutzername
#  passwort   = enteliWEB-Passwort
#  site       = BACnet Site-Name (z.B. MeinStandort)
#  device     = Device-ID (z.B. 1234)
#  priority   = BACnet Priority 1-16 (14 laesst manuelle Uebersteuerung zu)
#  dry_run    = ja  -> sendet NICHTS, loggt nur die Requests (sicher zum Testen)
#               nein -> schreibt wirklich (oder Flag --live nutzen)
#  verify_tls = ja/nein - TLS-Zertifikat pruefen (bei https; selbstsigniert: nein)
#
#  ANPASSEN: Trage hier deine echten Zugangsdaten ein (nicht committen!).
# --------------------------------------------------------------

protokoll  = http
host       = DEIN_ENTELIWEB_SERVER
port       = 80
benutzer   = DEIN_BENUTZER
passwort   = DEIN_PASSWORT
site       = DEINE_SITE
device     = 1234
priority   = 14
dry_run    = ja
verify_tls = ja


[quellen]
# --------------------------------------------------------------
#  Welche Datenquellen sind aktiv? (an / aus)
# --------------------------------------------------------------
strompreis = an
wetter     = an


[strompreis_objekte]
# --------------------------------------------------------------
#  Ziel-BACnet-Objekte fuer Strompreise (REST-Weg)
# --------------------------------------------------------------
#  av_aktuell      = Objekt fuer den aktuellen Preis, Format "typ,instanz"
#  av_morgen_basis = (optional) Start-Instanz fuer die 24 Stundenpreise morgen.
#                    Es werden analog-value,<basis> .. <basis+23> beschrieben.
#                    Zeile entfernen, wenn nur der aktuelle Preis genuegt.
#  fehlwert        = Wert fuer Stunden ohne Preis
# --------------------------------------------------------------

av_aktuell      = analog-value,1000
# av_morgen_basis = 1100   # deaktiviert: es wird nur der aktuelle Preis geschrieben
fehlwert        = -1.0


[wetter_api]
# --------------------------------------------------------------
#  Open-Meteo Wetterprognose (kostenlos, kein API-Key)
# --------------------------------------------------------------
#  latitude/longitude = Standort deiner Anlage (Beispiel unten: Berlin)
#  werte = Komma-Liste der Open-Meteo-Variablen, z.B.:
#          temperature_2m       Lufttemperatur (Grad C)
#          shortwave_radiation  Globalstrahlung (W/m2)
#          cloud_cover          Bewoelkung (%)
#          wind_speed_10m       Windgeschwindigkeit (km/h)
#  forecast_days = Anzahl Prognosetage (1-7)
#  timeout = Sekunden
# --------------------------------------------------------------

latitude      = 52.52
longitude     = 13.40
werte         = temperature_2m, shortwave_radiation
forecast_days = 2
timeout       = 30


[wetter_objekte]
# --------------------------------------------------------------
#  Ziel-BACnet-Objekte fuer Wetter (REST-Weg)
#  Schluessel = Open-Meteo-Variable, Wert = "typ,instanz"
# --------------------------------------------------------------

temperature_2m      = analog-value,1010
shortwave_radiation = analog-value,1011
