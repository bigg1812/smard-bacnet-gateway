# ══════════════════════════════════════════════════════════════
#  SMARD Wetterprognose CSV-Exporter – Konfigurationsdatei
# ══════════════════════════════════════════════════════════════

[wetter_api]
# --------------------------------------------------------------
#  Wetter API Einstellungen (Open-Meteo)
# --------------------------------------------------------------
#  latitude  = Breitengrad des Standorts (z. B. 52.52 fuer Berlin)
#  longitude = Längengrad des Standorts (z. B. 13.41 fuer Berlin)
#  timeout   = Wie lange auf Antwort warten (Sekunden)
# --------------------------------------------------------------
latitude  = 52.52
longitude = 13.41
timeout   = 30

[csv]
# --------------------------------------------------------------
#  CSV-Export Einstellungen
# --------------------------------------------------------------
#  dateipfad           = Wohin die CSV geschrieben wird (relativ oder absolut)
#  trennzeichen        = Spaltentrennzeichen (Standard: ; fuer deutsches Excel)
#  dezimaltrennzeichen = Komma fuer deutsche Zahlen (z. B. , statt .)
#  datumsformat        = Wie das Datum formatiert wird (%d.%m.%Y -> DD.MM.YYYY)
# --------------------------------------------------------------
dateipfad           = config/wetterprognose.csv
trennzeichen        = ;
dezimaltrennzeichen = ,
datumsformat        = %d.%m.%Y
