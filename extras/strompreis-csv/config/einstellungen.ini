# ══════════════════════════════════════════════════════════════
#  SMARD Strompreis CSV-Exporter – Konfigurationsdatei
# ══════════════════════════════════════════════════════════════

[smard_api]
# --------------------------------------------------------------
#  SMARD API Einstellungen (Bundesnetzagentur)
# --------------------------------------------------------------
#  filter_id = 4169 (Day-Ahead Grosshandelspreis)
#  region    = DE-LU (Marktgebiet Deutschland/Luxemburg)
#  timeout   = Wie lange auf Antwort warten (Sekunden)
# --------------------------------------------------------------
filter_id = 4169
region    = DE-LU
timeout   = 30

[einheiten]
# --------------------------------------------------------------
#  Umrechnung der Preise
# --------------------------------------------------------------
#  SMARD liefert immer EUR/MWh. Mit dem Faktor wird umgerechnet:
#    faktor = 1.0    →  EUR/MWh   (Rohwert von der Boerse)
#    faktor = 0.1    →  ct/kWh    (gaengig in Deutschland)
#    faktor = 0.001  →  EUR/kWh
# --------------------------------------------------------------
faktor = 0.1
einheit = ct/kWh

[csv]
# --------------------------------------------------------------
#  CSV-Export Einstellungen
# --------------------------------------------------------------
#  dateipfad           = Wohin die CSV geschrieben wird (relativ oder absolut)
#  trennzeichen        = Spaltentrennzeichen (Standard: ; fuer deutsches Excel)
#  dezimaltrennzeichen = Komma fuer deutsche Zahlen (z. B. , statt .)
#  datumsformat        = Wie das Datum formatiert wird (%d.%m.%Y -> DD.MM.YYYY)
# --------------------------------------------------------------
dateipfad           = config/strompreise.csv
trennzeichen        = ;
dezimaltrennzeichen = ,
datumsformat        = %d.%m.%Y
